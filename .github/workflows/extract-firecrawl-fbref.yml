name: Scrape FBref via Firecrawl to knowledge/raw

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: extract-firecrawl
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python extract/extract_fbref_firecrawl.py

      - name: Commit refreshed knowledge/raw if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge/raw/
          if git diff --cached --quiet -- knowledge/raw/; then
            echo "No changes in knowledge/raw/, nothing to commit."
            exit 0
          fi
          git commit -m "chore(scrape): refresh knowledge/raw [skip ci]"
          git push
